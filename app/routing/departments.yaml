# 장기인수 관련 부서 라우팅 설정
# 키워드는 토큰 단위(공백/·/괄호 등으로 분리됨)로 부분일치 매칭된다.

departments:
  - id: contract_mgmt
    name: "장기계약관리파트"
    keywords:
      # 가입금액
      - 가입금액
      # 신청약·변경·부활
      - 신청약
      - 변경
      - 부활
      # 보험료계산
      - 보험료계산
      # 출력·서식
      - 출력
      - 서식
      # 환급율
      - 환급율
      # 승환계약
      - 승환계약
      # 스캔·수납
      - 스캔
      - 수납
      # 할인
      - 할인
      # 전환실손 상품청약
      - 전환실손
      - 상품청약
      # 담보삭제
      - 담보삭제

  - id: product_dev
    name: "장기상품개발파트"
    keywords:
      # 약관 / 약관사항
      - 약관
      - 약관사항
      # 사업방법서
      - 사업방법서
      # 보장내용
      - 보장내용
      # 전환실손(전환대상담보)
      - 전환실손
      - 전환대상담보
      # 의무부가약관(보험료납입면제 대상보장)
      - 의무부가약관
      - 보험료납입면제
      - 대상보장

# 매칭 0건이거나 동점일 때 가는 기본 부서
# 운영 문의가 더 일반적이므로 장기계약관리파트를 기본으로 설정
default: contract_mgmt
